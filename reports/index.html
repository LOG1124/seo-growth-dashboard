<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Google SEO 看板存档</title>
    <style>
      :root { color: #25242a; background: #f6f7f9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; background: #f6f7f9; }
      main { width: 100%; max-width: none; margin: 0 auto; padding: 24px clamp(22px, 3vw, 52px) 80px; }
      .topbar { display: flex; align-items: center; justify-content: space-between; gap: 24px; min-height: 82px; padding: 14px 0; border-bottom: 1px solid #d9dae0; }
      .brand h1 { margin: 0; color: #4b2e73; font-size: clamp(22px, 2vw, 30px); font-weight: 500; letter-spacing: -.025em; }
      .brand p { margin: 5px 0 0; color: #77757f; font-size: 12px; }
      .latest-link { padding: 9px 12px; border: 1px solid #d8d9df; border-radius: 6px; color: #4b2e73; background: #fff; font-size: 13px; text-decoration: none; }
      .intro { padding: 30px 0 22px; border-bottom: 1px solid #e1e2e6; }
      .intro h2 { margin: 0 0 6px; color: #4b2e73; font-size: 24px; font-weight: 500; letter-spacing: -.02em; }
      .intro p { margin: 0; color: #77757f; font-size: 14px; }
      ul { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; margin: 22px 0 0; padding: 0; list-style: none; }
      li { min-width: 0; }
      li a { display: flex; align-items: center; justify-content: space-between; gap: 16px; min-height: 112px; padding: 18px 20px; border: 1px solid #e1e2e6; border-radius: 8px; color: #25242a; background: #fff; text-decoration: none; transition: border-color .15s ease, background .15s ease; }
      li a:hover { border-color: #bdb5cb; background: #fbfafe; }
      li strong { color: #4b2e73; font-size: 17px; font-weight: 500; }
      li span { color: #77757f; font-size: 13px; white-space: nowrap; }
      @media (max-width: 620px) { main { padding: 14px 14px 58px; } .topbar { align-items: flex-start; flex-direction: column; gap: 12px; } }
    </style>
  </head>
  <body>
    <main>
      <header class="topbar">
        <div class="brand"><h1>Google SEO 数据增长看板</h1><p>liangyin-aluminum.com · 报告存档</p></div>
        <a class="latest-link" href="../">查看最新看板 →</a>
      </header>
      <section class="intro"><h2>报告存档</h2><p>已归档报告保持独立，不受首页后续格式或数据更新影响。</p></section>
      <ul>
        <!-- archive-links -->
        <li><a href="./2026-03-to-05/"><strong>2026 年 3 月至 5 月</strong><span>查看报告 →</span></a></li>
      </ul>
    </main>
  </body>
</html>
